<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SOLEC · Panel Ciro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14; --surface:#151820; --surface2:#1c2030; --border:#252a3a;
  --rojo:#e63946; --amarillo:#f4a261; --verde:#2a9d8f; --azul:#457b9d;
  --text:#e8eaf0; --muted:#6b7280;
  --title:'Bebas Neue',sans-serif; --body:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--body);min-height:100vh}
.topbar{position:sticky;top:0;z-index:50;height:56px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px}
.logo{font-family:var(--title);font-size:22px;letter-spacing:2px;color:var(--rojo)}
.logo span{color:var(--text)}
.main{max-width:1000px;margin:0 auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.chip{padding:6px 12px;border:1px solid var(--border);border-radius:999px;background:transparent;color:var(--muted);
  cursor:pointer;font-size:12px}
.chip.active{background:var(--rojo);border-color:var(--rojo);color:#fff}
.search{padding:10px 12px;border-radius:999px;border:1px solid var(--border);background:var(--surface2);color:var(--text);
  outline:none;min-width:220px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start}
.card:hover{border-color:var(--azul)}
.small{color:var(--muted);font-size:12px}
.h{font-weight:600}
.btn{border:none;border-radius:10px;padding:10px 14px;font-family:var(--body);font-weight:700;cursor:pointer}
.btn.primary{background:var(--azul);color:#fff}
.btn.green{background:var(--verde);color:#fff}
.btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.modalO{position:fixed;inset:0;background:#000a;display:none;align-items:flex-start;justify-content:center;padding:18px;overflow:auto;z-index:200}
.modal{width:100%;max-width:780px;background:var(--surface);border:1px solid var(--border);border-radius:16px}
.mh{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mh h2{font-family:var(--title);letter-spacing:1px}
.mb{padding:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px}
.inp{width:100%;padding:10px 10px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);outline:none}
.line{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.line:last-child{border-bottom:none}
.total{display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-top:12px}
.total b{font-family:var(--title);font-size:28px;color:var(--verde)}
.footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;justify-content:space-between;gap:10px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo"><span>SOL</span>EC® <span style="font-family:var(--body);font-size:12px;color:var(--muted);letter-spacing:0;margin-left:8px">Panel Ciro</span></div>
  <div class="small">Ciro · Administrador</div>
</div>

<div class="main">
  <div class="row">
    <button class="chip active" id="fPend" onclick="setFiltro('Pendiente')">⏳ Para revisar</button>
    <button class="chip" id="fEnv" onclick="setFiltro('Enviado')">📤 Enviados</button>
    <button class="chip" id="fApr" onclick="setFiltro('Aprobado')">✅ Aprobados</button>
    <button class="chip" id="fRech" onclick="setFiltro('Rechazado')">⛔ Rechazados</button>
    <input class="search" id="q" placeholder="Buscar edificio..." oninput="render()">
    <button class="btn ghost" onclick="cargar()">↻ Actualizar</button>
  </div>

  <div id="lista" class="small">Cargando…</div>
</div>

<div class="modalO" id="modalO">
  <div class="modal">
    <div class="mh">
      <div>
        <h2 id="mt">Registro</h2>
        <div class="small" id="ms"></div>
      </div>
      <button class="btn ghost" onclick="cerrar()">✕ Cerrar</button>
    </div>

    <div class="mb">
      <div class="grid2">
        <div class="box">
          <div class="small">Mano de obra (texto de Mario)</div>
          <div id="mTrab" class="small" style="margin-top:8px;white-space:pre-wrap"></div>
          <div style="margin-top:10px">
            <div class="small">Total MO</div>
            <input class="inp" type="number" id="tMO" placeholder="0" oninput="recalc()">
          </div>
        </div>

        <div class="box">
          <div class="small">Materiales (texto de Mario)</div>
          <div id="mMat" class="small" style="margin-top:8px;white-space:pre-wrap"></div>
          <div style="margin-top:10px">
            <div class="small">Total materiales</div>
            <input class="inp" type="number" id="tMAT" placeholder="0" oninput="recalc()">
          </div>
        </div>
      </div>

      <div class="box" style="margin-top:12px">
        <div class="small">Resumen ARCA (lo que vas a copiar/pegar)</div>
        <textarea class="inp" id="resArca" style="height:90px;resize:none;margin-top:8px" placeholder="Ej: Servicio de iluminación en parque · Reemplazo 5 dicroicas · Total $..."></textarea>
      </div>

      <div class="total">
        <div class="small">Total</div>
        <b id="tTOTAL">$0</b>
      </div>
    </div>

    <div class="footer">
      <button class="btn ghost" onclick="cerrar()">Cancelar</button>
      <div style="display:flex;gap:8px">
        <button class="btn primary" onclick="guardarSinEnviar()">Guardar</button>
        <button class="btn green" onclick="enviarDueno()">📤 Enviar al dueño</button>
      </div>
    </div>
  </div>
</div>

<script>
const SHEETDB_URL = "https://sheetdb.io/api/v1/pqo4oljkpi6dj";
let registros = [];
let filtro = "Pendiente";
let actual = null;

function money(n){ n = Number(n||0); return "$" + n.toLocaleString("es-AR"); }
function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

function setFiltro(f){
  filtro = f;
  document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
  ({Pendiente:"fPend",Enviado:"fEnv",Aprobado:"fApr",Rechazado:"fRech"})[f] && document.getElementById(({Pendiente:"fPend",Enviado:"fEnv",Aprobado:"fApr",Rechazado:"fRech"})[f]).classList.add("active");
  render();
}

async function cargar(){
  document.getElementById("lista").textContent = "Cargando…";
  const res = await fetch(SHEETDB_URL + "?sheet=Registros");
  const data = await res.json();
  registros = data.map(r=>({
    id: String(r["ID"]||"").trim(),
    fecha: r["Fecha"]||"",
    hin: r["Hora Inicio"]||"",
    hfin: r["Hora Fin"]||"",
    edificio: r["Edificio"]||"",
    tipo: r["Tipo de Visita"]||"",
    cats: r["Categorias"]||"",
    trabajos: [r["Trabajos Estructurados"], r["Trabajos Libres"]].filter(Boolean).join("\n"),
    materiales: [r["Materiales Estructurados"], r["Materiales Libres"]].filter(Boolean).join("\n"),
    estado: String(r["Estado"]||"Pendiente").trim(),
    notaDueno: String(r["Nota Dueno"]||r["Nota Dueño"]||"").trim(),
    totalMO: Number(r["Total MO"]||0),
    totalMAT: Number(r["Total MAT"]||0),
    total: Number(r["Total"]||0),
    resumenArca: String(r["Resumen ARCA"]||"").trim(),
  })).filter(r=>r.id);

  render();
}

function render(){
  const q = norm(document.getElementById("q").value);
  const list = registros
    .filter(r => r.estado === filtro)
    .filter(r => !q || norm(r.edificio).includes(q));

  if(list.length===0){
    document.getElementById("lista").innerHTML = `<div class="small" style="opacity:.8;padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:12px">Sin registros en “${filtro}”.</div>`;
    return;
  }

  document.getElementById("lista").innerHTML = list.map(r=>`
    <div class="card" onclick="abrir('${r.id}')">
      <div style="min-width:120px">
        <div class="small">${r.fecha}</div>
        <div class="h">${r.hin} → ${r.hfin}</div>
      </div>
      <div style="flex:1">
        <div class="h">${r.edificio}</div>
        <div class="small">${r.tipo}${r.cats?(" · "+r.cats):""}</div>
        <div class="small" style="opacity:.9;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${(r.trabajos||"").replace(/\n/g," · ")}</div>
      </div>
      <div>
        <button class="btn primary" type="button" onclick="event.stopPropagation();abrir('${r.id}')">Ver / Costear</button>
      </div>
    </div>
  `).join("");
}

function abrir(id){
  actual = registros.find(r=>r.id===id);
  if(!actual) return;

  document.getElementById("mt").textContent = actual.edificio || "Registro";
  document.getElementById("ms").textContent = `${actual.fecha} · ${actual.tipo} · ${actual.hin} → ${actual.hfin} · Estado: ${actual.estado}`;

  document.getElementById("mTrab").textContent = actual.trabajos || "—";
  document.getElementById("mMat").textContent = actual.materiales || "—";

  document.getElementById("tMO").value = actual.totalMO || "";
  document.getElementById("tMAT").value = actual.totalMAT || "";
  document.getElementById("resArca").value = actual.resumenArca || "";

  recalc();
  document.getElementById("modalO").style.display="flex";
}

function cerrar(){
  document.getElementById("modalO").style.display="none";
  actual = null;
}

function recalc(){
  const mo = Number(document.getElementById("tMO").value||0);
  const mat = Number(document.getElementById("tMAT").value||0);
  document.getElementById("tTOTAL").textContent = money(mo+mat);
}

async function patchActual(data){
  if(!actual) return;
  const url = `${SHEETDB_URL}/ID/${encodeURIComponent(actual.id)}?sheet=Registros`;
  const res = await fetch(url,{
    method:"PATCH",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ data })
  });
  if(!res.ok) throw new Error("HTTP "+res.status);
}

async function guardarSinEnviar(){
  if(!actual) return;
  try{
    const mo = Number(document.getElementById("tMO").value||0);
    const mat = Number(document.getElementById("tMAT").value||0);
    const total = mo+mat;
    const resumen = document.getElementById("resArca").value.trim();

    await patchActual({
      "Total MO": mo,
      "Total MAT": mat,
      "Total": total,
      "Resumen ARCA": resumen
    });

    alert("Guardado ✅");
    await cargar();
    abrir(actual.id);
  }catch(e){
    console.error(e);
    alert("Error guardando.");
  }
}

async function enviarDueno(){
  if(!actual) return;
  try{
    const mo = Number(document.getElementById("tMO").value||0);
    const mat = Number(document.getElementById("tMAT").value||0);
    const total = mo+mat;
    const resumen = document.getElementById("resArca").value.trim();

    await patchActual({
      "Total MO": mo,
      "Total MAT": mat,
      "Total": total,
      "Resumen ARCA": resumen,
      "Estado": "Enviado"
    });

    alert("Enviado al dueño ✅");
    cerrar();
    await cargar();
  }catch(e){
    console.error(e);
    alert("Error enviando.");
  }
}

cargar();
</script>
</body>
</html>
